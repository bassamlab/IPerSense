name: Docs CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .devcontainer/requirements.txt

      - name: Fail on Sphinx warnings
        run: sphinx-build -b html . _build/html -W --keep-going

      - name: Check external links
        run: |
          sphinx-build -b linkcheck . _build/linkcheck -W --keep-going \
            -D suppress_warnings=misc.copy_overwrite \
            -D linkcheck_ignore='https://www\.embedded\.rwth-aachen\.de/.*' \
            -D linkcheck_ignore='https://www\.unibw\.de/.*'

  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .devcontainer/requirements.txt

      - name: Set DOCS_BASEURL
        run: |
          BASE_URL="https://bassamlab.github.io/IPerSys"

          echo "DOCS_BASEURL=$BASE_URL" >> "$GITHUB_ENV"
          echo "Using DOCS_BASEURL=$BASE_URL"

      - name: Build HTML
        run: make html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  publish:
    name: Publish to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
